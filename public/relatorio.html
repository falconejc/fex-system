<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios - Frango Expresso</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; }
  header { background: #10b981; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header a { color: white; text-decoration: none; font-size: 20px; }
  header h1 { font-size: 20px; }
  .btn-logoff { padding: 7px 14px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .filtro { background: white; border-radius: 12px; padding: 16px 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filtro label { font-size: 14px; color: #555; }
  .filtro input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .filtro button { padding: 8px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .resumo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .resumo-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .resumo-card .num { font-size: 32px; font-weight: bold; color: #333; }
  .resumo-card .desc { font-size: 12px; color: #888; margin-top: 4px; }
  .resumo-card.pendente .num { color: #f59e0b; }
  .resumo-card.entregue .num { color: #10b981; }
  .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; color: #555; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; background: #f9fafb; color: #666; font-weight: 600; border-bottom: 1px solid #eee; }
  td { padding: 8px; border-bottom: 1px solid #f3f4f6; color: #333; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .badge-pendente { background: #fef3c7; color: #92400e; }
  .badge-entregue { background: #d1fae5; color: #065f46; }
  .badge-cancelado { background: #fee2e2; color: #991b1b; }
  .vazio { text-align: center; color: #aaa; padding: 20px; font-size: 14px; }
  .acoes { display: flex; gap: 6px; }
  .btn-editar { padding: 5px 10px; background: #eff6ff; color: #1e40af; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .btn-cancelar-item { padding: 5px 10px; background: #fee2e2; color: #991b1b; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
  .modal.aberto { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 28px; max-width: 440px; width: 90%; max-height: 90vh; overflow-y: auto; }
  .modal-box h3 { font-size: 18px; color: #333; margin-bottom: 16px; }
  label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; margin-top: 14px; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: Arial; }
  textarea { min-height: 70px; resize: vertical; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-acoes { display: flex; gap: 10px; margin-top: 20px; }
  .btn-salvar { flex: 1; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-fechar { flex: 1; padding: 12px; background: #f3f4f6; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/">&#8592;</a>
    <h1>📊 Relatórios</h1>
  </div>
  <button class="btn-logoff" onclick="logoff()">Sair</button>
</header>
<div class="container">
  <div class="filtro">
    <label>Data:</label>
    <input type="date" id="data-filtro">
    <button onclick="carregar()">Buscar</button>
  </div>
  <div class="resumo" id="resumo"></div>
  <div class="card">
    <h2>🍗 Vendas de Frango</h2>
    <div id="tabela-frango"><div class="vazio">Carregando...</div></div>
  </div>
  <div class="card">
    <h2>🛵 Pedidos Delivery</h2>
    <div id="tabela-delivery"><div class="vazio">Carregando...</div></div>
  </div>
</div>

<div class="modal" id="modal-frango">
  <div class="modal-box">
    <h3>Editar venda</h3>
    <input type="hidden" id="f-id">
    <label>Tipo</label>
    <select id="f-tipo">
      <option value="simples">Frango Simples</option>
      <option value="bacon">Frango com Bacon</option>
    </select>
    <label>Atendente</label>
    <input type="text" id="f-atendente">
    <label>Status</label>
    <select id="f-status">
      <option value="pendente">Pendente</option>
      <option value="entregue">Entregue</option>
    </select>
    <div class="modal-acoes">
      <button class="btn-fechar" onclick="fechar('modal-frango')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarFrango()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal" id="modal-delivery">
  <div class="modal-box">
    <h3>Editar pedido</h3>
    <input type="hidden" id="d-id">
    <div class="grid2">
      <div>
        <label>Tipo</label>
        <select id="d-tipo">
          <option value="entrega">Entrega</option>
          <option value="retirada">Retirada</option>
        </select>
      </div>
      <div>
        <label>Status</label>
        <select id="d-status">
          <option value="pendente">Pendente</option>
          <option value="entregue">Entregue</option>
        </select>
      </div>
    </div>
    <label>Atendente</label>
    <input type="text" id="d-atendente">
    <label>Cliente</label>
    <input type="text" id="d-cliente">
    <label>Endereço</label>
    <input type="text" id="d-endereco">
    <div class="grid2">
      <div><label>Número</label><input type="text" id="d-numero"></div>
      <div><label>Bairro</label><input type="text" id="d-bairro"></div>
    </div>
    <label>Referência</label>
    <input type="text" id="d-referencia">
    <label>Pagamento</label>
    <select id="d-pagamento">
      <option value="pix">Pix</option>
      <option value="cartao">Cartão</option>
      <option value="dinheiro">Dinheiro</option>
    </select>
    <label>Descrição</label>
    <textarea id="d-descricao"></textarea>
    <div class="modal-acoes">
      <button class="btn-fechar" onclick="fechar('modal-delivery')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarDelivery()">Salvar</button>
    </div>
  </div>
</div>

<script>
  let nivelUsuario = '';
  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('data-filtro').value = hoje;

  async function init() {
    const res = await fetch('/api/auth/me');
    const user = await res.json();
    nivelUsuario = user.nivel;
    carregar();
  }

  async function carregar() {
    const data = document.getElementById('data-filtro').value;
    const res = await fetch('/api/relatorio/dia?data=' + data);
    const json = await res.json();
    renderResumo(json.resumo);
    renderFrango(json.vendas);
    renderDelivery(json.delivery);
  }

  function renderResumo(r) {
    document.getElementById('resumo').innerHTML = `
      <div class="resumo-card"><div class="num">${r.total_vendas}</div><div class="desc">Frangos vendidos</div></div>
      <div class="resumo-card pendente"><div class="num">${r.vendas_pendentes + r.delivery_pendentes}</div><div class="desc">Pendentes</div></div>
      <div class="resumo-card entregue"><div class="num">${r.vendas_entregues + r.delivery_entregues}</div><div class="desc">Entregues</div></div>
    `;
  }

  function renderFrango(vendas) {
    const el = document.getElementById('tabela-frango');
    if (!vendas.length) { el.innerHTML = '<div class="vazio">Nenhuma venda no período</div>'; return; }
    const isAdmin = nivelUsuario === 'admin';
    el.innerHTML = `<table>
      <thead><tr><th>Código</th><th>Tipo</th><th>Atendente</th><th>Compra</th><th>Entrega</th><th>Status</th>${isAdmin ? '<th>Ações</th>' : ''}</tr></thead>
      <tbody>${vendas.map(v => `<tr>
        <td><strong>${v.codigo}</strong></td>
        <td>${v.tipo_nome || v.tipo}</td>
        <td>${v.atendente}</td>
        <td>${new Date(v.horario_compra).toLocaleTimeString('pt-BR')}</td>
        <td>${v.horario_entrega ? new Date(v.horario_entrega).toLocaleTimeString('pt-BR') : '-'}</td>
        <td><span class="badge badge-${v.status}">${v.status}</span></td>
        ${isAdmin ? `<td><div class="acoes">
          <button class="btn-editar" onclick='abrirFrango(${JSON.stringify(v)})'>Editar</button>
          ${v.status !== 'cancelado' ? `<button class="btn-cancelar-item" onclick="cancelarFrango(${v.id})">Cancelar</button>` : ''}
        </div></td>` : ''}
      </tr>`).join('')}</tbody>
    </table>`;
  }

  function renderDelivery(pedidos) {
    const el = document.getElementById('tabela-delivery');
    if (!pedidos.length) { el.innerHTML = '<div class="vazio">Nenhum pedido no período</div>'; return; }
    const isAdmin = nivelUsuario === 'admin';
    el.innerHTML = `<table>
      <thead><tr><th>Código</th><th>Cliente</th><th>Tipo</th><th>Pagamento</th><th>Horário</th><th>Status</th>${isAdmin ? '<th>Ações</th>' : ''}</tr></thead>
      <tbody>${pedidos.map(p => `<tr>
        <td><strong>${p.codigo}</strong></td>
        <td>${p.nome_cliente}</td>
        <td>${p.tipo === 'entrega' ? '🛵' : '🏪'} ${p.tipo}</td>
        <td>${p.pagamento}</td>
        <td>${new Date(p.horario_pedido).toLocaleTimeString('pt-BR')}</td>
        <td><span class="badge badge-${p.status}">${p.status}</span></td>
        ${isAdmin ? `<td><div class="acoes">
          <button class="btn-editar" onclick='abrirDelivery(${JSON.stringify(p)})'>Editar</button>
          ${p.status !== 'cancelado' ? `<button class="btn-cancelar-item" onclick="cancelarDelivery(${p.id})">Cancelar</button>` : ''}
        </div></td>` : ''}
      </tr>`).join('')}</tbody>
    </table>`;
  }

  function abrirFrango(v) {
    document.getElementById('f-id').value = v.id;
    document.getElementById('f-tipo').value = v.tipo;
    document.getElementById('f-atendente').value = v.atendente;
    document.getElementById('f-status').value = v.status;
    document.getElementById('modal-frango').classList.add('aberto');
  }

  function abrirDelivery(p) {
    document.getElementById('d-id').value = p.id;
    document.getElementById('d-tipo').value = p.tipo;
    document.getElementById('d-status').value = p.status;
    document.getElementById('d-atendente').value = p.atendente;
    document.getElementById('d-cliente').value = p.nome_cliente;
    document.getElementById('d-endereco').value = p.endereco || '';
    document.getElementById('d-numero').value = p.numero || '';
    document.getElementById('d-bairro').value = p.bairro || '';
    document.getElementById('d-referencia').value = p.referencia || '';
    document.getElementById('d-pagamento').value = p.pagamento;
    document.getElementById('d-descricao').value = p.descricao || '';
    document.getElementById('modal-delivery').classList.add('aberto');
  }

  function fechar(id) { document.getElementById(id).classList.remove('aberto'); }

  async function salvarFrango() {
    const id = document.getElementById('f-id').value;
    const res = await fetch(`/api/frango/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tipo: document.getElementById('f-tipo').value,
        atendente: document.getElementById('f-atendente').value,
        status: document.getElementById('f-status').value
      })
    });
    const data = await res.json();
    if (data.sucesso) { fechar('modal-frango'); carregar(); }
    else alert(data.erro);
  }

  async function salvarDelivery() {
    const id = document.getElementById('d-id').value;
    const res = await fetch(`/api/delivery/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tipo: document.getElementById('d-tipo').value,
        status: document.getElementById('d-status').value,
        atendente: document.getElementById('d-atendente').value,
        nome_cliente: document.getElementById('d-cliente').value,
        endereco: document.getElementById('d-endereco').value,
        numero: document.getElementById('d-numero').value,
        bairro: document.getElementById('d-bairro').value,
        referencia: document.getElementById('d-referencia').value,
        pagamento: document.getElementById('d-pagamento').value,
        descricao: document.getElementById('d-descricao').value
      })
    });
    const data = await res.json();
    if (data.sucesso) { fechar('modal-delivery'); carregar(); }
    else alert(data.erro);
  }

  async function cancelarFrango(id) {
    if (!confirm('Cancelar esta venda?')) return;
    const res = await fetch(`/api/frango/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.sucesso) carregar();
    else alert(data.erro);
  }

  async function cancelarDelivery(id) {
    if (!confirm('Cancelar este pedido?')) return;
    const res = await fetch(`/api/delivery/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.sucesso) carregar();
    else alert(data.erro);
  }

  async function logoff() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  init();
</script>
</body>
</html>
