<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fex System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }
  header { background: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .header-left h1 { font-size: 20px; color: #333; }
  .header-left p { font-size: 13px; color: #888; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .usuario-info { text-align: right; }
  .usuario-info .nome { font-size: 14px; color: #333; font-weight: bold; }
  .usuario-info .nivel { font-size: 12px; color: #888; }
  .btn-logoff { padding: 8px 16px; background: #fee2e2; color: #991b1b; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-logoff:hover { background: #fecaca; }
  .container { max-width: 700px; margin: 40px auto; padding: 0 20px; text-align: center; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
  .card { background: white; border-radius: 16px; padding: 36px 28px; width: 200px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; color: inherit; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
  .card .icon { font-size: 48px; margin-bottom: 14px; }
  .card h2 { font-size: 16px; color: #333; margin-bottom: 6px; }
  .card p { font-size: 12px; color: #888; }
  .card.frango { border-top: 4px solid #f59e0b; }
  .card.delivery { border-top: 4px solid #3b82f6; }
  .card.relatorio { border-top: 4px solid #10b981; }
  .card.usuarios { border-top: 4px solid #8b5cf6; }
  .card.hidden { display: none; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>🍗 Fex System</h1>
    <p>Sistema de Vendas</p>
  </div>
  <div class="header-right">
    <div class="usuario-info">
      <div class="nome" id="header-nome">...</div>
      <div class="nivel" id="header-nivel">...</div>
    </div>
    <button class="btn-logoff" onclick="logoff()">Sair</button>
  </div>
</header>

<div class="container">
  <div class="cards">
    <a href="/frango.html" class="card frango">
      <div class="icon">🍗</div>
      <h2>Frango</h2>
      <p>Registrar venda e dar baixa</p>
    </a>
    <a href="/delivery.html" class="card delivery">
      <div class="icon">🛵</div>
      <h2>Delivery</h2>
      <p>Registrar pedido e imprimir</p>
    </a>
    <a href="/relatorio.html" class="card relatorio">
      <div class="icon">📊</div>
      <h2>Relatórios</h2>
      <p>Vendas e entregas do dia</p>
    </a>
    <a href="/usuarios.html" class="card usuarios" id="card-usuarios">
      <div class="icon">👥</div>
      <h2>Usuários</h2>
      <p>Gerenciar acessos</p>
    </a>
  </div>
</div>

<script>
  async function carregarUsuario() {
    const res = await fetch('/api/auth/me');
    if (!res.ok) { window.location.href = '/login.html'; return; }
    const user = await res.json();
    document.getElementById('header-nome').textContent = user.nome;
    const niveis = { admin: 'Administrador', operador: 'Operador', dono: 'Dono' };
    document.getElementById('header-nivel').textContent = niveis[user.nivel] || user.nivel;
    if (user.nivel !== 'admin') {
      document.getElementById('card-usuarios').classList.add('hidden');
    }
  }

  async function logoff() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  carregarUsuario();
</script>
</body>
</html>
