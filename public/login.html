<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Frango Expresso</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo img { width: 140px; height: auto; }
  label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; margin-top: 16px; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
  input:focus { outline: none; border-color: #f59e0b; }
  .btn { width: 100%; padding: 14px; background: #f59e0b; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 24px; }
  .btn:hover { background: #d97706; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .erro { background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 16px; display: none; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/logo.jfif" alt="Frango Expresso">
  </div>
  <label>Usuário</label>
  <input type="text" id="usuario" placeholder="Seu usuário" autocomplete="username">
  <label>Senha</label>
  <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
  <div class="erro" id="erro"></div>
  <button class="btn" onclick="login()">Entrar</button>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  async function login() {
    const usuario = document.getElementById('usuario').value.trim();
    const senha = document.getElementById('senha').value;
    if (!usuario || !senha) { mostrarErro('Preencha todos os campos'); return; }
    const btn = document.querySelector('.btn');
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erro);
      window.location.href = '/';
    } catch(e) {
      mostrarErro(e.message);
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  }
  function mostrarErro(msg) {
    const el = document.getElementById('erro');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
