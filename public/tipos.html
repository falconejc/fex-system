<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipos de Frango - Fex System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; }
  header { background: #f59e0b; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header a { color: white; text-decoration: none; font-size: 20px; }
  header h1 { font-size: 20px; }
  .btn-logoff { padding: 7px 14px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
  .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  .card-header h2 { font-size: 16px; color: #555; }
  .btn-novo { padding: 8px 16px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .tipo-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; }
  .tipo-item .info .nome { font-weight: bold; font-size: 15px; color: #333; }
  .tipo-item .info .detalhe { font-size: 12px; color: #888; margin-top: 3px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 8px; }
  .badge-ativo { background: #d1fae5; color: #065f46; }
  .badge-inativo { background: #f3f4f6; color: #6b7280; }
  .acoes { display: flex; gap: 8px; }
  .btn-editar { padding: 7px 14px; background: #eff6ff; color: #1e40af; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; margin-top: 14px; text-align: left; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: Arial; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
  .modal.aberto { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 28px; max-width: 400px; width: 90%; }
  .modal-box h3 { font-size: 18px; color: #333; margin-bottom: 4px; }
  .modal-box p { font-size: 13px; color: #888; margin-bottom: 8px; }
  .modal-acoes { display: flex; gap: 10px; margin-top: 20px; }
  .btn-salvar { flex: 1; padding: 12px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-cancelar { flex: 1; padding: 12px; background: #f3f4f6; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .preco-input { position: relative; }
  .preco-input span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 14px; }
  .preco-input input { padding-left: 28px; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/">&#8592;</a>
    <h1>🍗 Tipos de Frango</h1>
  </div>
  <button class="btn-logoff" onclick="logoff()">Sair</button>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Tipos cadastrados</h2>
      <button class="btn-novo" onclick="abrirModalNovo()">+ Novo tipo</button>
    </div>
    <div id="lista-tipos"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modal-titulo">Novo tipo</h3>
    <p id="modal-sub">Preencha os dados do novo tipo de frango</p>
    <input type="hidden" id="edit-id">
    <label>Nome</label>
    <input type="text" id="edit-nome" placeholder="Ex: Com Catupiry">
    <label>Ícone (emoji)</label>
    <input type="text" id="edit-icone" placeholder="Ex: 🍗 🥓 🧀" maxlength="4" style="font-size:20px;width:80px">
    <label>Descrição (opcional)</label>
    <input type="text" id="edit-desc" placeholder="Ex: Frango assado com catupiry">
    <label>Preço (R$)</label>
    <div class="preco-input">
      <span>R$</span>
      <input type="number" id="edit-preco" min="0" step="0.01" placeholder="0,00">
    </div>
    <label>Status</label>
    <select id="edit-ativo">
      <option value="1">Ativo</option>
      <option value="0">Inativo</option>
    </select>
    <div class="modal-acoes">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-salvar" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
  let editando = false;

  async function carregar() {
    const res = await fetch('/api/tipos/todos');
    if (res.status === 403) { window.location.href = '/'; return; }
    const lista = await res.json();
    const el = document.getElementById('lista-tipos');
    if (!lista.length) { el.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">Nenhum tipo cadastrado</p>'; return; }
    el.innerHTML = lista.map(t => `
      <div class="tipo-item">
        <div class="info">
          <div class="nome">${t.icone || '🍗'} ${t.nome} <span class="badge badge-${t.ativo ? 'ativo' : 'inativo'}">${t.ativo ? 'Ativo' : 'Inativo'}</span></div>
          <div class="detalhe">${t.descricao || 'Sem descrição'} • R$ ${parseFloat(t.preco).toFixed(2)}</div>
        </div>
        <div class="acoes">
          <button class="btn-editar" onclick="abrirInsumos(${t.id}, '${t.nome}')">Insumos</button>
          <button class="btn-editar" onclick="abrirModalEditar(${t.id}, '${t.nome}', '${t.descricao||''}', ${t.preco}, ${t.ativo}, '${t.icone||'🍗'}')">Editar</button>
        </div>
      </div>
    `).join('');
  }

  function abrirModalNovo() {
    editando = false;
    document.getElementById('modal-titulo').textContent = 'Novo tipo';
    document.getElementById('modal-sub').textContent = 'Preencha os dados do novo tipo de frango';
    document.getElementById('edit-id').value = '';
    document.getElementById('edit-nome').value = '';
    document.getElementById('edit-icone').value = '🍗';
    document.getElementById('edit-desc').value = '';
    document.getElementById('edit-preco').value = '';
    document.getElementById('edit-ativo').value = '1';
    document.getElementById('modal').classList.add('aberto');
  }

  function abrirModalEditar(id, nome, desc, preco, ativo, icone) {
    editando = true;
    document.getElementById('modal-titulo').textContent = 'Editar tipo';
    document.getElementById('modal-sub').textContent = 'Altere os dados do tipo de frango';
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-nome').value = nome;
    document.getElementById('edit-icone').value = icone || '🍗';
    document.getElementById('edit-desc').value = desc;
    document.getElementById('edit-preco').value = preco;
    document.getElementById('edit-ativo').value = ativo;
    document.getElementById('modal').classList.add('aberto');
  }

  async function salvar() {
    const nome = document.getElementById('edit-nome').value.trim();
    const descricao = document.getElementById('edit-desc').value.trim();
    const preco = parseFloat(document.getElementById('edit-preco').value) || 0;
    const ativo = parseInt(document.getElementById('edit-ativo').value);
    const id = document.getElementById('edit-id').value;
    if (!nome) { alert('Informe o nome'); return; }
    const url = editando ? `/api/tipos/${id}` : '/api/tipos';
    const method = editando ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, descricao, preco, ativo })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.erro); return; }
    fecharModal();
    carregar();
  }

  // Modal de insumos do tipo
  let tipoInsumoAtual = null;
  let todosInsumos = [];

  async function abrirInsumos(id, nome) {
    tipoInsumoAtual = id;
    document.getElementById('modal-insumos-titulo').textContent = 'Insumos: ' + nome;
    const [resV, resI] = await Promise.all([
      fetch('/api/tipos/' + id + '/insumos'),
      fetch('/api/estoque_modulo/insumos')
    ]);
    const vinculados = await resV.json();
    todosInsumos = await resI.json();

    const select = document.getElementById('novo-insumo-select');
    select.innerHTML = todosInsumos.map(i => '<option value="' + i.id + '">' + i.nome + ' (' + i.unidade + ')</option>').join('');

    renderVinculados(vinculados);
    document.getElementById('modal-insumos').classList.add('aberto');
  }

  function renderVinculados(lista) {
    const el = document.getElementById('lista-vinculados');
    if (!lista.length) { el.innerHTML = '<p style="color:#aaa;font-size:13px;padding:10px 0">Nenhum insumo vinculado</p>'; return; }
    el.innerHTML = lista.map(v => '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">' +
      '<span style="font-size:14px"><strong>' + v.nome + '</strong> — ' + v.quantidade + ' ' + v.unidade + ' por frango</span>' +
      '<button onclick="desvincular(' + v.insumo_id + ')" style="padding:4px 10px;background:#fee2e2;color:#991b1b;border:none;border-radius:5px;cursor:pointer;font-size:12px">Remover</button>' +
      '</div>').join('');
  }

  async function vincularInsumo() {
    const insumo_id = parseInt(document.getElementById('novo-insumo-select').value);
    const quantidade = parseFloat(document.getElementById('novo-insumo-qtd').value);
    if (!quantidade || quantidade <= 0) { alert('Informe a quantidade'); return; }
    const res = await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ insumo_id, quantidade })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.erro); return; }
    document.getElementById('novo-insumo-qtd').value = '';
    const resV = await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos');
    renderVinculados(await resV.json());
  }

  async function desvincular(insumo_id) {
    if (!confirm('Remover este insumo?')) return;
    await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos/' + insumo_id, { method: 'DELETE' });
    const resV = await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos');
    renderVinculados(await resV.json());
  }

  // Modal de insumos do tipo
  let tipoInsumoAtual = null;
  let todosInsumos = [];

  async function abrirInsumos(id, nome) {
    tipoInsumoAtual = id;
    document.getElementById('modal-insumos-titulo').textContent = 'Insumos: ' + nome;
    const [resV, resI] = await Promise.all([
      fetch('/api/tipos/' + id + '/insumos'),
      fetch('/api/estoque_modulo/insumos')
    ]);
    const vinculados = await resV.json();
    todosInsumos = await resI.json();

    const select = document.getElementById('novo-insumo-select');
    select.innerHTML = todosInsumos.map(i => '<option value="' + i.id + '">' + i.nome + ' (' + i.unidade + ')</option>').join('');

    renderVinculados(vinculados);
    document.getElementById('modal-insumos').classList.add('aberto');
  }

  function renderVinculados(lista) {
    const el = document.getElementById('lista-vinculados');
    if (!lista.length) { el.innerHTML = '<p style="color:#aaa;font-size:13px;padding:10px 0">Nenhum insumo vinculado</p>'; return; }
    el.innerHTML = lista.map(v => '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">' +
      '<span style="font-size:14px"><strong>' + v.nome + '</strong> — ' + v.quantidade + ' ' + v.unidade + ' por frango</span>' +
      '<button onclick="desvincular(' + v.insumo_id + ')" style="padding:4px 10px;background:#fee2e2;color:#991b1b;border:none;border-radius:5px;cursor:pointer;font-size:12px">Remover</button>' +
      '</div>').join('');
  }

  async function vincularInsumo() {
    const insumo_id = parseInt(document.getElementById('novo-insumo-select').value);
    const quantidade = parseFloat(document.getElementById('novo-insumo-qtd').value);
    if (!quantidade || quantidade <= 0) { alert('Informe a quantidade'); return; }
    const res = await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ insumo_id, quantidade })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.erro); return; }
    document.getElementById('novo-insumo-qtd').value = '';
    const resV = await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos');
    renderVinculados(await resV.json());
  }

  async function desvincular(insumo_id) {
    if (!confirm('Remover este insumo?')) return;
    await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos/' + insumo_id, { method: 'DELETE' });
    const resV = await fetch('/api/tipos/' + tipoInsumoAtual + '/insumos');
    renderVinculados(await resV.json());
  }

  function fecharModal() { document.getElementById('modal').classList.remove('aberto'); }

  async function logoff() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  carregar();
</script>
</body>
</html>
