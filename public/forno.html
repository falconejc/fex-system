<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forno - Frango Expresso</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; }
  header { background: #f59e0b; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header a { color: white; text-decoration: none; font-size: 20px; }
  header h1 { font-size: 20px; }
  .btn-logoff { padding: 7px 14px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .container { max-width: 600px; margin: 24px auto; padding: 0 16px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  .card-header h2 { font-size: 16px; color: #555; }
  .btn-primary { padding: 9px 18px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .lote-item { border: 1px solid #eee; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .lote-item.assando { border-left: 4px solid #f59e0b; }
  .lote-item.pronto { border-left: 4px solid #10b981; background: #f0fdf4; }
  .lote-topo { display: flex; justify-content: space-between; align-items: flex-start; }
  .lote-qtd { font-size: 28px; font-weight: bold; color: #333; }
  .lote-qtd span { font-size: 13px; color: #888; font-weight: normal; }
  .lote-status { padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: bold; }
  .status-assando { background: #fef3c7; color: #92400e; }
  .status-pronto { background: #d1fae5; color: #065f46; }
  .lote-tempo { font-size: 13px; color: #555; margin-top: 6px; }
  .lote-tempo strong { color: #f59e0b; }
  .lote-tempo.pronto-txt { color: #10b981; font-weight: bold; }
  .lote-acoes { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .btn-pronto { padding: 7px 14px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-atraso { padding: 7px 14px; background: #fee2e2; color: #991b1b; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .estoque-box { background: #f9fafb; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; }
  .estoque-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; }
  .estoque-row .label { color: #555; }
  .estoque-row .valor { font-weight: bold; color: #333; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .badge-ok { background: #d1fae5; color: #065f46; }
  .badge-baixo { background: #fef3c7; color: #92400e; }
  .badge-esgotado { background: #fee2e2; color: #991b1b; }
  .vazio { text-align: center; color: #aaa; padding: 20px; font-size: 14px; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
  .modal.aberto { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 24px; max-width: 380px; width: 90%; text-align: left; }
  .modal-box h3 { font-size: 17px; color: #333; margin-bottom: 4px; }
  .modal-box p { font-size: 13px; color: #888; margin-bottom: 12px; }
  label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; margin-top: 12px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: Arial; }
  .modal-acoes { display: flex; gap: 10px; margin-top: 16px; }
  .btn-salvar { flex: 1; padding: 12px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-cancelar { flex: 1; padding: 12px; background: #f3f4f6; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .espetos-wrapper { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .espeto { display: flex; align-items: center; gap: 5px; background: #fef3c7; border-radius: 6px; padding: 5px 8px; }
  .lote-item.pronto .espeto { background: #d1fae5; }
  .espeto-palito { width: 3px; border-radius: 2px; background: #92400e; align-self: stretch; min-height: 22px; }
  .espeto-frangos { display: flex; gap: 1px; font-size: 20px; line-height: 1; }
  @keyframes pulsar { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.92); } }
  .lote-item.assando .espeto-frangos { animation: pulsar 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/">&#8592;</a>
    <h1>🔥 Forno</h1>
  </div>
  <button class="btn-logoff" onclick="logoff()">Sair</button>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Estoque de frangos crus</h2>
    </div>
    <div id="estoque-crus"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>🔥 Lotes no forno</h2>
      <button class="btn-primary" onclick="abrirModalLote()">+ Novo lote</button>
    </div>
    <div id="lista-lotes"><div class="vazio">Nenhum lote hoje</div></div>
  </div>
</div>

<!-- Modal novo lote -->
<div class="modal" id="modal-lote">
  <div class="modal-box">
    <h3>Novo lote no forno</h3>
    <p>O limite é baseado no estoque de frangos crus disponíveis</p>
    <label>Tipo de frango</label>
    <select id="lote-tipo" onchange="atualizarDisponivel()"></select>
    <div id="aviso-disponivel" style="font-size:13px;padding:8px 10px;border-radius:7px;margin-top:8px"></div>
    <label>Quantidade</label>
    <input type="number" id="lote-qtd" min="1" placeholder="Ex: 10">
    <label>Observação (opcional)</label>
    <input type="text" id="lote-obs" placeholder="Ex: forno 2">
    <div class="modal-acoes">
      <button class="btn-cancelar" onclick="fecharModal('modal-lote')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarLote()">Colocar no forno</button>
    </div>
  </div>
</div>

<!-- Modal atraso -->
<div class="modal" id="modal-atraso">
  <div class="modal-box">
    <h3>Adicionar tempo ao lote</h3>
    <label>Quantos minutos a mais?</label>
    <select id="atraso-minutos">
      <option value="10">+10 minutos</option>
      <option value="15">+15 minutos</option>
      <option value="20">+20 minutos</option>
      <option value="30">+30 minutos</option>
      <option value="45">+45 minutos</option>
    </select>
    <input type="hidden" id="atraso-lote-id">
    <div class="modal-acoes">
      <button class="btn-cancelar" onclick="fecharModal('modal-atraso')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarAtraso()">Confirmar</button>
    </div>
  </div>
</div>

<script>
  let estoqueDisponivel = {};
  let nivelUsuario = '';

  function formatarHora(str) {
    if (!str) return '-';
    const p = str.replace('T', ' ').split(/[- :]/);
    return p[3].padStart(2,'0') + ':' + p[4].padStart(2,'0');
  }

  function renderEspetos(quantidade) {
    const POR_ESPETO = 5;
    const numEspetos = Math.ceil(quantidade / POR_ESPETO);
    let html = '<div class="espetos-wrapper">';
    for (let i = 0; i < numEspetos; i++) {
      const neste = Math.min(POR_ESPETO, quantidade - i * POR_ESPETO);
      html += '<div class="espeto"><div class="espeto-palito"></div><div class="espeto-frangos">';
      for (let j = 0; j < neste; j++) html += '🍗';
      html += '</div></div>';
    }
    return html + '</div>';
  }

  function minutosRestantes(str) {
    const p = str.replace('T', ' ').split(/[- :]/);
    const d = new Date(p[0], p[1]-1, p[2], p[3], p[4], p[5]||0);
    return Math.ceil((d - new Date()) / 60000);
  }

  async function init() {
    const res = await fetch('/api/auth/me');
    const user = await res.json();
    nivelUsuario = user.nivel;
    await carregarEstoqueCrus();
    await carregarLotes();
    setInterval(() => { carregarLotes(); carregarEstoqueCrus(); }, 30000);
  }

  async function carregarEstoqueCrus() {
    const res = await fetch('/api/estoque_modulo/frangos-crus');
    const lista = await res.json();
    estoqueDisponivel = {};
    lista.forEach(c => { estoqueDisponivel[c.tipo_id] = Math.max(0, c.total_crus - c.total_assados); });
    const el = document.getElementById('estoque-crus');
    if (!lista.length || lista.every(c => c.total_crus === 0)) {
      el.innerHTML = '<div class="vazio" style="padding:10px">Nenhum frango cru registrado hoje</div>'; return;
    }
    el.innerHTML = lista.map(c => {
      const disp = Math.max(0, c.total_crus - c.total_assados);
      const badge = disp === 0 ? 'esgotado' : disp <= 5 ? 'baixo' : 'ok';
      return `<div class="estoque-row">
        <span class="label">🍗 ${c.tipo_nome}</span>
        <span class="valor">${c.total_crus} crus • ${c.total_assados} em lotes •
          <span class="badge badge-${badge}">${disp} disponíveis</span>
        </span>
      </div>`;
    }).join('');
  }

  async function carregarLotes() {
    const res = await fetch('/api/lotes/ativos');
    const lotes = await res.json();
    const el = document.getElementById('lista-lotes');
    if (!lotes.length) { el.innerHTML = '<div class="vazio">Nenhum lote hoje</div>'; return; }
    el.innerHTML = lotes.map(l => {
      const pronto = l.status === 'pronto';
      const min = minutosRestantes(l.horario_previsto);
      const hora = formatarHora(l.horario_previsto);
      const tempoTxt = pronto
        ? '<div class="lote-tempo pronto-txt">✅ Pronto para retirada!</div>'
        : min <= 0
          ? '<div class="lote-tempo pronto-txt">✅ Deve estar pronto agora!</div>'
          : `<div class="lote-tempo">Previsto: <strong>${hora}</strong> (~${min} min)</div>`;
      return `<div class="lote-item ${l.status}">
        <div class="lote-topo">
          <div class="lote-qtd">${l.quantidade} <span>${l.tipo_nome || ''}</span></div>
          <span class="lote-status status-${l.status}">${pronto ? 'Pronto' : 'Assando'}</span>
        </div>
        ${l.observacao ? `<div style="font-size:12px;color:#888;margin-top:4px">📝 ${l.observacao}</div>` : ''}
        ${tempoTxt}
        ${renderEspetos(l.quantidade)}
        ${!pronto ? `<div class="lote-acoes">
          <button class="btn-pronto" onclick="marcarPronto(${l.id})">Marcar como pronto</button>
          <button class="btn-atraso" onclick="abrirAtraso(${l.id})">+ Tempo</button>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  async function abrirModalLote() {
    const res = await fetch('/api/tipos');
    const tipos = await res.json();
    await carregarEstoqueCrus();
    const sel = document.getElementById('lote-tipo');
    sel.innerHTML = tipos.map(t => {
      const disp = estoqueDisponivel[t.id] ?? 0;
      return `<option value="${t.id}">${t.nome} (${disp} disponíveis)</option>`;
    }).join('');
    document.getElementById('lote-qtd').value = '';
    document.getElementById('lote-obs').value = '';
    atualizarDisponivel();
    document.getElementById('modal-lote').classList.add('aberto');
  }

  function atualizarDisponivel() {
    const tipo_id = parseInt(document.getElementById('lote-tipo').value);
    const disp = estoqueDisponivel[tipo_id] ?? 0;
    const el = document.getElementById('aviso-disponivel');
    if (disp <= 0) {
      el.style.background = '#fee2e2'; el.style.color = '#991b1b';
      el.textContent = '⚠️ Nenhum frango cru disponível para este tipo.';
    } else {
      el.style.background = '#f0fdf4'; el.style.color = '#065f46';
      el.textContent = '✅ Disponível para assar: ' + disp + ' frango(s)';
    }
  }

  async function salvarLote() {
    const quantidade = parseInt(document.getElementById('lote-qtd').value);
    const tipo_id = parseInt(document.getElementById('lote-tipo').value);
    if (!quantidade || quantidade <= 0) { alert('Informe a quantidade'); return; }
    const res = await fetch('/api/lotes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quantidade, tipo_id, observacao: document.getElementById('lote-obs').value.trim() })
    });
    const data = await res.json();
    if (res.status === 409 && data.requer_confirmacao) {
      if (confirm(data.detalhe + '\n\nClique OK para prosseguir mesmo assim.')) {
        const res2 = await fetch('/api/lotes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantidade, tipo_id, observacao: document.getElementById('lote-obs').value.trim(), forcar: true })
        });
        const data2 = await res2.json();
        if (data2.sucesso) { fecharModal('modal-lote'); carregarLotes(); carregarEstoqueCrus(); }
        else alert(data2.erro);
      }
      return;
    }
    if (!data.sucesso) { alert('❌ ' + data.erro + '\n\n' + (data.detalhe || '')); return; }
    fecharModal('modal-lote');
    alert('Lote registrado! Previsão: ' + formatarHora(data.horario_previsto));
    carregarLotes();
    carregarEstoqueCrus();
  }

  async function marcarPronto(id) {
    if (!confirm('Confirmar que este lote está pronto?')) return;
    const res = await fetch(`/api/lotes/${id}/pronto`, { method: 'PUT' });
    const data = await res.json();
    if (data.sucesso) carregarLotes();
    else alert(data.erro);
  }

  function abrirAtraso(id) {
    document.getElementById('atraso-lote-id').value = id;
    document.getElementById('modal-atraso').classList.add('aberto');
  }

  async function salvarAtraso() {
    const id = document.getElementById('atraso-lote-id').value;
    const minutos = parseInt(document.getElementById('atraso-minutos').value);
    const res = await fetch(`/api/lotes/${id}/tempo`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ minutos_extras: minutos })
    });
    const data = await res.json();
    if (data.sucesso) { fecharModal('modal-atraso'); carregarLotes(); }
    else alert(data.erro);
  }

  function fecharModal(id) { document.getElementById(id).classList.remove('aberto'); }

  async function logoff() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  init();
</script>
</body>
</html>
