<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste QR</title>
<style>
  body { font-family: Arial; padding: 20px; background: #f5f5f5; text-align: center; }
  video { width: 100%; max-width: 400px; border-radius: 8px; background: #000; display: block; margin: 0 auto; }
  canvas { display: none; }
  #status { margin: 12px 0; font-size: 15px; padding: 10px; background: white; border-radius: 8px; }
  #resultado { font-size: 22px; font-weight: bold; color: #10b981; margin-top: 12px; min-height: 30px; }
  button { margin: 8px; padding: 14px 28px; background: #f59e0b; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<h2>Teste de Leitura QR</h2>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Clique em Iniciar</div>
<div id="resultado"></div>
<button onclick="iniciar()">Iniciar</button>
<button onclick="parar()" style="background:#ef4444">Parar</button>

<script src="/jsqr.min.js"></script>
<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let rodando = false;
  let stream = null;

  function status(msg) { document.getElementById('status').textContent = msg; }

  async function iniciar() {
    status('Solicitando câmera...');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        status('Câmera pronta! Aponte para um QR code...');
        rodando = true;
        setTimeout(tick, 500);
      };
    } catch(e) {
      status('Erro câmera: ' + e.message);
    }
  }

  function tick() {
    if (!rodando) return;
    if (video.readyState < 2 || video.videoWidth === 0) {
      status('Aguardando vídeo... (' + video.readyState + ')');
      setTimeout(tick, 300);
      return;
    }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    status('Resolução: ' + canvas.width + 'x' + canvas.height + ' — lendo...');
    try {
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' })
                || jsQR(img.data, img.width, img.height, { inversionAttempts: 'invertFirst' });
      if (code) {
        document.getElementById('resultado').textContent = 'Lido: ' + code.data;
        status('Sucesso!');
        parar();
        return;
      }
    } catch(e) {
      status('Erro leitura: ' + e.message);
    }
    setTimeout(tick, 200);
  }

  function parar() {
    rodando = false;
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }
</script>
</body>
</html>
