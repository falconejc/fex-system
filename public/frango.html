<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frango - Fex System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; }
  header { background: #f59e0b; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header a { color: white; text-decoration: none; font-size: 20px; }
  header h1 { font-size: 20px; }
  .btn-logoff { padding: 7px 14px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .container { max-width: 600px; margin: 24px auto; padding: 0 16px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  .card-header h2 { font-size: 16px; color: #555; }
  label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; margin-top: 14px; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: Arial; }
  textarea { resize: vertical; min-height: 60px; }
  .atendente-box { background: #f9fafb; border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; font-size: 15px; color: #333; }
  .tipos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 6px; }
  .tipo-btn { padding: 14px 10px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-size: 14px; text-align: center; transition: all 0.2s; }
  .tipo-btn.ativo { border-color: #f59e0b; background: #fef3c7; color: #92400e; font-weight: bold; }
  .tipo-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tipo-btn .tipo-nome { font-weight: bold; font-size: 15px; }
  .tipo-btn .tipo-est { font-size: 11px; margin-top: 4px; }
  .tipo-btn .tipo-aviso { font-size: 11px; color: #f59e0b; margin-top: 2px; }
  .btn-estoque { padding: 6px 14px; background: #eff6ff; color: #1e40af; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn { width: 100%; padding: 14px; background: #f59e0b; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  .btn:hover { background: #d97706; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
  .item .info .codigo { font-weight: bold; font-size: 16px; color: #333; }
  .item .info .tipo-tag { font-size: 12px; color: #888; }
  .item .info .obs { font-size: 12px; color: #f59e0b; margin-top: 2px; }
  .btn-entrega { padding: 8px 16px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .vazio { text-align: center; color: #aaa; padding: 20px; font-size: 14px; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
  .modal.aberto { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 24px; max-width: 380px; width: 90%; text-align: center; }
  .modal-box.left { text-align: left; }
  .modal-codigo { font-size: 44px; font-weight: bold; color: #f59e0b; letter-spacing: 4px; margin: 10px 0; }
  .modal-info { font-size: 14px; color: #666; margin-bottom: 6px; }
  .modal-aviso { font-size: 13px; color: #f59e0b; font-weight: bold; margin-bottom: 14px; }
  .btn-imprimir { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-bottom: 8px; }
  .btn-fechar { width: 100%; padding: 11px; background: #f3f4f6; color: #333; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .modal-acoes { display: flex; gap: 10px; margin-top: 16px; }
  .btn-salvar { flex: 1; padding: 12px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-cancelar { flex: 1; padding: 12px; background: #f3f4f6; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .est-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
  .est-row:last-child { border-bottom: none; }
  .est-row input { width: 90px; text-align: center; padding: 7px; }
  video { width: 100%; border-radius: 8px; background: #000; }
  #scanner-status { font-size: 13px; color: #888; margin-top: 8px; }
  #qr-canvas { margin: 10px auto 0; display: block; }
  .lote-aviso { background: #fef3c7; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #92400e; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/">&#8592;</a>
    <h1>🍗 Venda de Frango</h1>
  </div>
  <button class="btn-logoff" onclick="logoff()">Sair</button>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Estoque do dia</h2>
      <button class="btn-estoque" id="btn-config-estoque" onclick="abrirEstoque()">Configurar</button>
    </div>
    <div id="estoque-display"><div class="vazio">Carregando...</div></div>
  </div>

  <div class="card">
    <h2 style="font-size:16px;color:#555;margin-bottom:14px;border-bottom:1px solid #eee;padding-bottom:10px">Nova Venda</h2>
    <label>Atendente</label>
    <div class="atendente-box" id="atendente-box">Carregando...</div>
    <label>Tipo de frango</label>
    <div class="tipos-grid" id="tipos-grid"></div>
    <div id="lote-aviso-venda"></div>
    <label>WhatsApp do cliente <span style="color:#aaa;font-weight:normal">(opcional)</span></label>
    <input type="tel" id="telefone" placeholder="Ex: 38999999999">
    <label>Observações <span style="color:#aaa;font-weight:normal">(opcional)</span></label>
    <textarea id="observacao" placeholder="Ex: sem sal, bem passado..."></textarea>
    <button class="btn" id="btn-vender" onclick="registrarVenda()">Registrar Venda e Imprimir</button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Aguardando Entrega</h2>
      <button class="btn-estoque" onclick="abrirScanner()">📷 Ler QR Code</button>
    </div>
    <div id="pendentes"><div class="vazio">Carregando...</div></div>
  </div>
</div>

<!-- Modal venda -->
<div class="modal" id="modal-venda">
  <div class="modal-box">
    <div style="font-size:15px;color:#555">Venda registrada!</div>
    <div class="modal-codigo" id="modal-codigo"></div>
    <div class="modal-info" id="modal-info"></div>
    <div class="modal-aviso" id="modal-aviso-lote"></div>
    <canvas id="qr-canvas"></canvas>
    <button class="btn-imprimir" onclick="imprimir()">🖨️ Imprimir Comprovante</button>
    <button class="btn-imprimir" id="btn-wpp" onclick="enviarWhatsApp()" style="background:#25d366;display:none">📱 Enviar WhatsApp</button>
    <button class="btn-fechar" onclick="fecharModal('modal-venda')">Fechar</button>
  </div>
</div>

<!-- Modal estoque -->
<div class="modal" id="modal-estoque">
  <div class="modal-box left">
    <h3 style="font-size:17px;color:#333;margin-bottom:4px">Estoque do dia</h3>
    <p style="font-size:13px;color:#888;margin-bottom:12px">Defina a quantidade de cada tipo hoje</p>
    <div id="estoque-inputs"></div>
    <div class="modal-acoes">
      <button class="btn-cancelar" onclick="fecharModal('modal-estoque')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarEstoque()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal scanner -->
<div class="modal" id="modal-scanner">
  <div class="modal-box">
    <h3 style="font-size:17px;color:#333;margin-bottom:12px">Ler QR Code</h3>
    <video id="video-scanner" autoplay playsinline muted></video>
    <div id="scanner-status">Iniciando câmera...</div>
    <button class="btn-fechar" style="margin-top:12px" onclick="fecharScanner()">Fechar</button>
  </div>
</div>

<!-- Modal confirmar QR -->
<div class="modal" id="modal-confirmar-qr">
  <div class="modal-box">
    <div style="font-size:15px;color:#555">Confirmar entrega?</div>
    <div class="modal-codigo" id="qr-codigo" style="font-size:34px"></div>
    <div class="modal-info" id="qr-info"></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn-fechar" style="flex:1" onclick="fecharModal('modal-confirmar-qr')">Cancelar</button>
      <button style="flex:1;padding:12px;background:#10b981;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer" onclick="confirmarEntregaQR()">Confirmar</button>
    </div>
  </div>
</div>

<script src="/jsqr.min.js"></script>
<script>
  let tipoSelecionado = null;
  let vendaAtual = null;
  let usuarioAtual = null;
  let estoqueAtual = [];
  let infoLoteAtual = null;
  let scannerStream = null;
  let codigoQRLido = null;

  async function init() {
    const res = await fetch('/api/auth/me');
    usuarioAtual = await res.json();
    document.getElementById('atendente-box').textContent = usuarioAtual.nome;
    if (usuarioAtual.nivel === 'dono') document.getElementById('btn-vender').disabled = true;
    await carregarEstoque();
    carregarPendentes();
    setInterval(() => { carregarEstoque(); carregarPendentes(); }, 20000);
  }

  async function carregarEstoque() {
    const res = await fetch('/api/estoque/hoje');
    estoqueAtual = await res.json();
    renderEstoque();
    renderTipos();
  }

  function renderEstoque() {
    const el = document.getElementById('estoque-display');
    if (!estoqueAtual.length) { el.innerHTML = '<div class="vazio">Estoque não configurado</div>'; return; }
    el.innerHTML = estoqueAtual.map(e => {
      const pct = e.total > 0 ? Math.max(0, Math.round(((e.total - e.vendidos) / e.total) * 100)) : 0;
      const cor = e.restantes === 0 ? '#ef4444' : e.restantes <= Math.ceil(e.total * 0.2) ? '#f59e0b' : '#10b981';
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:#555;margin-bottom:4px">
          <span><strong>${e.tipo_nome}</strong>
            ${e.assando > 0 ? `<span style="font-size:11px;color:#f59e0b;margin-left:6px">🔥 ${e.assando} assando</span>` : ''}
            ${e.prontos > 0 ? `<span style="font-size:11px;color:#10b981;margin-left:6px">✅ ${e.prontos} prontos</span>` : ''}
          </span>
          <span style="color:#888">${e.vendidos}/${e.total} vendidos • ${e.restantes} restantes</span>
        </div>
        <div style="background:#f3f4f6;border-radius:99px;height:8px">
          <div style="height:8px;border-radius:99px;background:${cor};width:${pct}%;transition:width 0.3s"></div>
        </div>
      </div>`;
    }).join('');
  }

  function renderTipos() {
    const grid = document.getElementById('tipos-grid');
    if (!estoqueAtual.length) { grid.innerHTML = '<div class="vazio" style="padding:10px;font-size:13px">Configure o estoque primeiro</div>'; return; }
    grid.innerHTML = estoqueAtual.map(e => {
      const esgotado = e.total > 0 && e.restantes <= 0;
      const assando = e.assando > 0 && e.restantes <= e.prontos;
      const ativo = tipoSelecionado === e.tipo_id;
      const icone = e.tipo_icone || '🍗';
      return `<button class="tipo-btn ${ativo ? 'ativo' : ''}" ${esgotado ? 'disabled' : ''} onclick="selecionarTipo(${e.tipo_id}, this)">
        <div class="tipo-nome">${icone} ${e.tipo_nome}</div>
        <div class="tipo-est" style="color:${esgotado ? '#ef4444' : '#888'}">${esgotado ? 'Esgotado' : e.restantes + ' disponíveis'}</div>
        ${assando ? `<div class="tipo-aviso">🔥 últimos, alguns assando</div>` : ''}
      </button>`;
    }).join('');
    if (!tipoSelecionado && estoqueAtual.length) {
      const primeiro = estoqueAtual.find(e => e.restantes > 0);
      if (primeiro) { tipoSelecionado = primeiro.tipo_id; renderTipos(); }
    }
  }

  function selecionarTipo(id, btn) {
    tipoSelecionado = id;
    renderTipos();
    atualizarAvisoLote();
  }

  async function atualizarAvisoLote() {
    if (!tipoSelecionado) return;
    const res = await fetch('/api/lotes/proximo/' + tipoSelecionado);
    infoLoteAtual = await res.json();
    const el = document.getElementById('lote-aviso-venda');
    if (infoLoteAtual.status === 'assando') {
      el.innerHTML = `<div class="lote-aviso">🔥 Alguns frangos ainda assando — previsão às <strong>${infoLoteAtual.hora_formatada}</strong> (~${infoLoteAtual.minutos_restantes} min)</div>`;
    } else {
      el.innerHTML = '';
    }
  }

  async function registrarVenda() {
    if (!tipoSelecionado) { alert('Selecione o tipo de frango'); return; }
    const btn = document.getElementById('btn-vender');
    btn.disabled = true; btn.textContent = 'Registrando...';
    try {
      const res = await fetch('/api/frango/venda', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo_id: tipoSelecionado, observacao: document.getElementById('observacao').value.trim(), telefone: document.getElementById('telefone').value.trim() })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erro);
      vendaAtual = data;

      const loteRes = await fetch('/api/lotes/proximo/' + tipoSelecionado);
      infoLoteAtual = await loteRes.json();

      document.getElementById('modal-codigo').textContent = data.codigo;
      document.getElementById('modal-info').textContent = '🍗 ' + (data.tipo_nome || data.tipo) + ' • ' + data.atendente;

      const avisoEl = document.getElementById('modal-aviso-lote');
      if (infoLoteAtual && infoLoteAtual.status === 'assando') {
        avisoEl.textContent = '🔥 Pronto às ' + infoLoteAtual.hora_formatada + ' (~' + infoLoteAtual.minutos_restantes + ' min)';
        avisoEl.style.display = 'block';
      } else {
        avisoEl.style.display = 'none';
      }

      const canvas = document.getElementById('qr-canvas');
      canvas.width = 150; canvas.height = 150;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, 150, 150);
      img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(data.codigo);

      document.getElementById('modal-venda').classList.add('aberto');
      const btnWpp = document.getElementById('btn-wpp');
      if (data.telefone) { btnWpp.style.display = 'block'; }
      else { btnWpp.style.display = 'none'; }
      document.getElementById('observacao').value = '';
      document.getElementById('telefone').value = '';
      carregarEstoque();
      carregarPendentes();

      // Mostra alerta se algum insumo zerou
      if (data.alertas_insumos && data.alertas_insumos.length > 0) {
        const nomes = data.alertas_insumos.map(a => a.nome + ' (' + a.quantidade_atual + ')').join(', ');
        setTimeout(() => alert('⚠️ Atenção! Estoque zerado ou negativo: ' + nomes), 500);
      }
    } catch(e) { alert(e.message); }
    btn.disabled = false; btn.textContent = 'Registrar Venda e Imprimir';
  }

  async function enviarWhatsApp() {
    if (!vendaAtual) return;
    const btn = document.getElementById('btn-wpp');
    btn.disabled = true;
    btn.textContent = '⏳ Enviando...';
    try {
      const res = await fetch('/api/whatsapp/comprovante/' + vendaAtual.codigo, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telefone: vendaAtual.telefone })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erro);
      btn.textContent = '✅ Enviado!';
      setTimeout(() => { btn.textContent = '📱 Enviar WhatsApp'; btn.disabled = false; }, 3000);
    } catch(e) {
      alert('Erro ao enviar: ' + e.message);
      btn.textContent = '📱 Enviar WhatsApp';
      btn.disabled = false;
    }
  }

  async function imprimir() {
    if (!vendaAtual) return;
    const qrDataUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=' + encodeURIComponent(vendaAtual.codigo);
    const w = window.open('', '_blank', 'width=400,height=650');
    const p = vendaAtual.horario_compra.replace('T',' ').split(/[- :]/);
    const dataCompra = new Date(p[0], p[1]-1, p[2], p[3], p[4], p[5]||0);
    const hora = dataCompra.toLocaleTimeString('pt-BR');
    const data = dataCompra.toLocaleDateString('pt-BR');
    const diaSemana = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Sao_Paulo'})).getDay();
    const isDomingo = diaSemana === 0;
    const horarioLimite = isDomingo ? '13:45' : '18:30';
    const diaTexto = isDomingo ? 'Domingo' : 'Dia de semana';
    const loteInfo = infoLoteAtual && infoLoteAtual.status === 'assando'
      ? `<div class="aviso" style="background:#fff8e1">
          <strong>PREVISÃO DE RETIRADA</strong><br>
          Às <strong>${infoLoteAtual.hora_formatada}</strong> (~${infoLoteAtual.minutos_restantes} min)
         </div>`
      : `<div class="aviso" style="background:#f0fff4"><strong>Frango pronto para retirada!</strong></div>`;

    w.document.write(`
      <html><head><title>Comprovante</title>
      <style>
        body { font-family: monospace; font-size: 14px; padding: 10px; width: 280px; }
        h2 { text-align: center; font-size: 16px; }
        h3 { text-align: center; font-size: 12px; font-weight: normal; color: #666; margin-top: 2px; }
        .linha { border-top: 1px dashed #000; margin: 8px 0; }
        .codigo { text-align: center; font-size: 30px; font-weight: bold; letter-spacing: 4px; margin: 8px 0; }
        .info { margin: 3px 0; }
        .obs { font-style: italic; font-size: 12px; margin-top: 4px; }
        .qr { text-align: center; margin: 8px 0; }
        .aviso { border: 1px solid #000; padding: 7px; margin: 7px 0; text-align: center; font-size: 12px; line-height: 1.6; }
        .rodape { text-align: center; font-size: 11px; margin-top: 8px; }
      </style></head><body>
      <h2>FRANGO EXPRESSO</h2>
      <div class="linha"></div>
      <div class="info">Data: ${data}  Hora: ${hora}</div>
      <div class="info">Atendente: ${vendaAtual.atendente}</div>
      <div class="info">Produto: ${vendaAtual.tipo_nome || vendaAtual.tipo}</div>
      ${vendaAtual.observacao ? `<div class="obs">Obs: ${vendaAtual.observacao}</div>` : ''}
      <div class="linha"></div>
      <div style="text-align:center;font-size:13px">Seu código:</div>
      <div class="codigo">${vendaAtual.codigo}</div>
      <div class="qr"><img src="${qrDataUrl}" width="120"></div>
      <div class="linha"></div>
      ${loteInfo}
      <div class="aviso">
        <strong>ATENÇÃO</strong><br>
        Retire seu frango <strong>hoje</strong>.<br>
        ${diaTexto}: retire até as <strong>${horarioLimite}</strong>.<br>
        Não nos responsabilizamos<br>por retiradas fora do prazo.
      </div>
      <div class="rodape">Guarde este comprovante<br>Apresente na retirada</div>
      <script>window.onload=()=>{window.print();}<\/script>
      </body></html>
    `);
    w.document.close();
  }

  async function carregarPendentes() {
    const res = await fetch('/api/frango/pendentes');
    const lista = await res.json();
    const el = document.getElementById('pendentes');
    if (!lista.length) { el.innerHTML = '<div class="vazio">Nenhuma entrega pendente</div>'; return; }
    el.innerHTML = lista.map(v => {
      const p = v.horario_compra.replace('T',' ').split(/[- :]/);
      const hora = new Date(p[0], p[1]-1, p[2], p[3], p[4], p[5]||0).toLocaleTimeString('pt-BR');
      return `<div class="item">
        <div class="info">
          <div class="codigo">${v.codigo}</div>
          <div class="tipo-tag">🍗 ${v.tipo_nome || v.tipo} • ${v.atendente}</div>
          ${v.observacao ? `<div class="obs">📝 ${v.observacao}</div>` : ''}
          <div class="tipo-tag" style="margin-top:2px">Comprado às ${hora}</div>
        </div>
        <button class="btn-entrega" onclick="darBaixa('${v.codigo}')">Entregar</button>
      </div>`;
    }).join('');
  }

  async function darBaixa(codigo) {
    if (!confirm('Confirmar entrega do código ' + codigo + '?')) return;
    const res = await fetch('/api/frango/entrega/' + codigo, { method: 'POST' });
    const data = await res.json();
    if (data.sucesso) { carregarPendentes(); carregarEstoque(); }
    else alert(data.erro);
  }

  function abrirEstoque() {
    const el = document.getElementById('estoque-inputs');
    el.innerHTML = estoqueAtual.map(e => `
      <div class="est-row">
        <span style="font-size:14px;color:#333">${e.tipo_icone || '🍗'} ${e.tipo_nome}</span>
        <input type="number" min="0" id="est-${e.tipo_id}" value="${e.total || ''}" placeholder="Qtd">
      </div>
    `).join('');
    document.getElementById('modal-estoque').classList.add('aberto');
  }

  async function salvarEstoque() {
    const estoques = estoqueAtual.map(e => ({
      tipo_id: e.tipo_id,
      quantidade: parseInt(document.getElementById('est-' + e.tipo_id).value) || 0
    }));
    const res = await fetch('/api/estoque', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ estoques })
    });
    const data = await res.json();
    if (data.sucesso) { fecharModal('modal-estoque'); carregarEstoque(); }
    else alert(data.erro);
  }

  function abrirScanner() {
    document.getElementById('modal-scanner').classList.add('aberto');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
      .then(stream => {
        scannerStream = stream;
        const video = document.getElementById('video-scanner');
        video.srcObject = stream;
        video.onloadedmetadata = () => { video.play(); setTimeout(() => tickScanner(video), 500); };
      })
      .catch(err => { document.getElementById('scanner-status').textContent = 'Erro: ' + err.message; });
  }

  function tickScanner(video) {
    if (!scannerStream) return;
    if (video.readyState < 2 || video.videoWidth === 0) { setTimeout(() => tickScanner(video), 300); return; }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    try {
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' })
                || jsQR(img.data, img.width, img.height, { inversionAttempts: 'invertFirst' });
      if (code && code.data) { fecharScanner(); abrirConfirmarQR(code.data); return; }
    } catch(e) {}
    setTimeout(() => tickScanner(video), 200);
  }

  function fecharScanner() {
    if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
    document.getElementById('modal-scanner').classList.remove('aberto');
  }

  async function abrirConfirmarQR(codigo) {
    codigoQRLido = codigo;
    const res = await fetch('/api/frango/qrcode/' + codigo);
    if (!res.ok) { alert('QR code inválido!'); return; }
    const venda = await res.json();
    if (venda.status === 'entregue') { alert('Este frango já foi entregue!'); return; }
    if (venda.cancelado) { alert('Esta venda foi cancelada!'); return; }
    document.getElementById('qr-codigo').textContent = venda.codigo;
    document.getElementById('qr-info').textContent = '🍗 ' + (venda.tipo_nome || venda.tipo) + (venda.observacao ? ' • ' + venda.observacao : '');
    document.getElementById('modal-confirmar-qr').classList.add('aberto');
  }

  async function confirmarEntregaQR() {
    const res = await fetch('/api/frango/entrega/' + codigoQRLido, { method: 'POST' });
    const data = await res.json();
    fecharModal('modal-confirmar-qr');
    if (data.sucesso) { carregarPendentes(); carregarEstoque(); }
    else alert(data.erro);
  }

  function fecharModal(id) { document.getElementById(id).classList.remove('aberto'); }

  async function logoff() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  init();
</script>
</body>
</html>
